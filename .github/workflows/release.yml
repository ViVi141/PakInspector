name: Release

# 推送语义化标签时构建 wheel/sdist 并上传到 GitHub Release。
# 支持常见语义化标签（GitHub 仅支持 glob 的 * ? []，不用正则 +）。
# 例如：1.0.0、1.2.3-beta.1；v1.0.0、v2.0.0-rc.1 等。
on:
  push:
    tags:
      - "*.*.*"
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install "build>=1.2"

      - name: Build sdist and wheel
        run: python -m build

      - name: List dist artifacts
        run: ls -la dist/

      - name: Upload workflow artifact (non-tag runs)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Create GitHub Release with assets
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.whl
            dist/*.tar.gz
